<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Inventory UAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50/50 text-gray-800 antialiased min-h-screen">
    <div id="app">
        <!-- Floating Glassmorphic Navbar -->
        <nav class="bg-pink-950/95 backdrop-blur-md sticky top-0 z-40 border-b border-pink-800/20 shadow-sm">
            <div class="max-w-6xl mx-auto px-6">
                <div class="flex justify-between items-center py-4">
                    <span class="font-extrabold text-white text-xl tracking-wide flex items-center gap-2">
                        <span class="text-2xl">📦</span> E-Inventory
                    </span>
                    <div class="flex space-x-4 items-center" :key="isLoggedIn">
                        <router-link to="/" class="text-pink-100 hover:text-white font-semibold transition duration-150">Katalog</router-link>
                        <router-link to="/dashboard" v-if="isLoggedIn && isAdmin" class="text-pink-100 hover:text-white font-semibold transition duration-150">Dashboard</router-link>
                        <router-link to="/login" v-if="!isLoggedIn" class="bg-white text-pink-950 hover:bg-pink-50 px-5 py-2 rounded-xl font-bold shadow-md transition duration-150">Login Admin</router-link>
                        <button v-if="isLoggedIn" @click="logout" class="bg-rose-600 hover:bg-rose-700 text-white px-5 py-2 rounded-xl font-bold shadow-md transition duration-150">Logout</button>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto py-8 px-4">
            <router-view></router-view>
        </main>
    </div>

    <script src="assets/js/components/UserPanel.js"></script>
    <script src="assets/js/components/Login.js"></script>
    <script src="assets/js/components/Dashboard.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
